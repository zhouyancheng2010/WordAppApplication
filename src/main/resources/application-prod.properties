# ====================================
# \u751F\u4EA7\u73AF\u5883\u914D\u7F6E
# ====================================

# ====================================
# \u6587\u4EF6\u914D\u7F6E - \u751F\u4EA7\u73AF\u5883\u6587\u4EF6\u8DEF\u5F84
# ====================================
app.file-md-path=/opt/WordApp/file.md

# ====================================
# \u6570\u636E\u5E93\u914D\u7F6E\uFF08\u751F\u4EA7\u73AF\u5883\uFF09
# \u26A0\uFE0F \u91CD\u8981\uFF1A\u9700\u8981\u5728\u963F\u91CC\u4E91\u670D\u52A1\u5668\u4E0A\u5B89\u88C5 MySQL \u540E\uFF0C\u4FEE\u6539\u4EE5\u4E0B\u914D\u7F6E
# ====================================
spring.datasource.url=jdbc:mysql://localhost:3306/worddb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000
spring.datasource.username=worddb
spring.datasource.password=150604

# ====================================
# \u6570\u636E\u5E93\u8FDE\u63A5\u6C60\u914D\u7F6E\uFF08\u751F\u4EA7\u73AF\u5883\u4F18\u5316\uFF09
# ====================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ====================================
# \u670D\u52A1\u5668\u914D\u7F6E\uFF08\u751F\u4EA7\u73AF\u5883\u4F18\u5316\uFF09
# ====================================
server.port=8080
server.address=0.0.0.0

# Tomcat \u6027\u80FD\u4F18\u5316
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
server.tomcat.accept-count=100
server.tomcat.max-connections=8192
server.tomcat.connection-timeout=20000

# ====================================
# JPA\u914D\u7F6E
# ====================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ====================================
# \u65E5\u5FD7\u914D\u7F6E\uFF08\u751F\u4EA7\u73AF\u5883\uFF09
# ====================================
logging.level.root=WARN
logging.level.com.example=INFO
logging.file.name=/opt/WordApp/logs/wordapp.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# \u65E5\u5FD7\u6587\u4EF6\u5927\u5C0F\u9650\u5236
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

# ====================================
# \u5176\u4ED6\u751F\u4EA7\u73AF\u5883\u4F18\u5316
# ====================================
# \u7981\u7528\u5F00\u53D1\u5DE5\u5177
spring.devtools.restart.enabled=false

# \u9759\u6001\u8D44\u6E90\u7F13\u5B58
spring.web.resources.cache.period=3600
spring.web.resources.chain.cache=true
