# ====================================
# \u6570\u636E\u5E93\u914D\u7F6E
# ====================================
spring.datasource.url=jdbc:mysql://localhost:3306/worddb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000
spring.datasource.username=root
spring.datasource.password=150604
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ====================================
# \u6570\u636E\u5E93\u8FDE\u63A5\u6C60\u914D\u7F6E\uFF08HikariCP\uFF09
# ====================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=-1

# ====================================
# JPA\u914D\u7F6E
# ====================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ====================================
# \u670D\u52A1\u5668\u914D\u7F6E
# ====================================
server.port=8080
server.address=${SERVER_ADDRESS:0.0.0.0}

# \u52A0\u5728\u8FD9\u91CC \u2193\u2193\u2193 \u63D0\u5347\u5916\u7F51\u8BBF\u95EE\u7A33\u5B9A\u6027
server.tomcat.max-threads=200
server.tomcat.accept-count=100

# ====================================
# \u6587\u4EF6\u914D\u7F6E
# ====================================
app.file-md-path=

# ====================================
# \u65E5\u5FD7\u914D\u7F6E
# ====================================
logging.level.root=INFO
logging.level.com.example=INFO
logging.file.name=logs/wordapp.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

