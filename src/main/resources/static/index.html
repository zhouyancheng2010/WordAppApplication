<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自考英语（二）4500词</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 350px;
            background: #fff;
            border-right: 1px solid #e4e7ed;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sidebar-header h1 {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border: none;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        .catalog-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .catalog-container::-webkit-scrollbar {
            width: 6px;
        }

        .catalog-container::-webkit-scrollbar-thumb {
            background: #dcdfe6;
            border-radius: 3px;
        }

        .catalog-level1 {
            margin: 5px 0;
        }

        .catalog-level1-title {
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #303133;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }

        .catalog-level1-title:hover {
            background: #f5f7fa;
        }

        .catalog-level1-title .arrow {
            font-size: 12px;
            transition: transform 0.3s;
        }

        .catalog-level1-title.expanded .arrow {
            transform: rotate(90deg);
        }

        .catalog-level2-container {
            display: none;
        }

        .catalog-level2-container.expanded {
            display: block;
        }

        .catalog-level2 {
            padding-left: 15px;
        }

        .catalog-level2-title {
            padding: 10px 20px;
            font-size: 14px;
            color: #606266;
            cursor: pointer;
            transition: background 0.2s;
        }

        .catalog-level2-title:hover {
            background: #f5f7fa;
        }

        .catalog-words {
            display: none;
            padding-left: 15px;
        }

        .catalog-words.expanded {
            display: block;
        }

        .catalog-word-item {
            padding: 8px 20px;
            font-size: 13px;
            color: #909399;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .catalog-word-item:hover {
            background: #f5f7fa;
            color: #667eea;
        }

        .catalog-word-item.active {
            background: #ecf0ff;
            color: #667eea;
            border-left-color: #667eea;
            font-weight: 500;
        }

        .speak-icon {
            font-size: 16px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            color: #667eea;
        }

        .catalog-word-item:hover .speak-icon {
            opacity: 1;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 20px 30px;
            background: #fff;
            border-bottom: 1px solid #e4e7ed;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .content-header h2 {
            font-size: 20px;
            color: #303133;
        }

        .filter-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-controls select {
            padding: 8px 15px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            color: #606266;
            outline: none;
            cursor: pointer;
        }

        .filter-controls select:hover {
            border-color: #667eea;
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .content-body::-webkit-scrollbar {
            width: 8px;
        }

        .content-body::-webkit-scrollbar-thumb {
            background: #dcdfe6;
            border-radius: 4px;
        }

        .word-card {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .word-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .word-card .word-title {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .word-card .word-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
        }

        .word-card .word-meta {
            color: #909399;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .word-card .markdown-content {
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .word-card .markdown-content h1,
        .word-card .markdown-content h2,
        .word-card .markdown-content h3,
        .word-card .markdown-content h4 {
            margin-top: 20px;
            margin-bottom: 12px;
            font-weight: 600;
            color: #303133;
        }

        .word-card .markdown-content h1 { font-size: 1.8em; }
        .word-card .markdown-content h2 { font-size: 1.5em; }
        .word-card .markdown-content h3 { font-size: 1.3em; }
        .word-card .markdown-content h4 { font-size: 1.1em; }

        .word-card .markdown-content strong {
            color: #667eea;
            font-weight: 700;
        }

        .word-card .markdown-content hr {
            border: none;
            border-top: 2px solid #e4e7ed;
            margin: 20px 0;
        }

        .word-card .markdown-content p {
            margin-bottom: 8px;
        }

        .speak-btn {
            padding: 6px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .speak-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .read-all-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .read-all-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .read-all-btn.reading {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background: #fff;
            border-top: 1px solid #e4e7ed;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #dcdfe6;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #606266;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            border-color: #667eea;
            color: #667eea;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination .page-info {
            font-size: 14px;
            color: #606266;
        }

        .pagination .jump-input {
            width: 60px;
            padding: 6px 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .pagination .jump-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .pagination .jump-btn:hover {
            background: #764ba2;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #909399;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
        }

        .no-data .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 40vh;
                border-right: none;
                border-bottom: 1px solid #e4e7ed;
            }

            .content-body {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>📚 自考英语（二）4500词</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索单词..." oninput="handleSearch(this.value)">
            </div>
        </div>
        <div class="catalog-container" id="catalogContainer">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <div class="content-area">
        <div class="content-header">
            <h2 id="contentTitle">单词详情</h2>
            <div class="filter-controls">
                <button class="read-all-btn" id="readAllBtn" onclick="toggleReadAll()">
                    🔊 全文朗读
                </button>
                <select id="filterSelect" onchange="handleFilter(this.value)">
                    <option value="all">全部显示</option>
                    <option value="layer1">一、基础必备层（800词）</option>
                    <option value="layer2">二、核心高频层（2000词）</option>
                    <option value="layer3">三、高频进阶层（1200词）</option>
                    <option value="layer4">四、低频储备层（1000词）</option>
                </select>
            </div>
        </div>
        <div class="content-body" id="contentBody">
            <div class="no-data">
                <div class="icon">📖</div>
                <p>请从左侧目录选择单词</p>
            </div>
        </div>
        <div class="pagination" id="pagination" style="display: none;">
            <button onclick="prevPage()" id="prevBtn">上一页</button>
            <span class="page-info">第 <span id="currentPage">1</span> / <span id="totalPages">1</span> 页</span>
            <input type="number" class="jump-input" id="jumpPage" min="1" placeholder="页码">
            <button class="jump-btn" onclick="jumpToPage()">跳转</button>
            <button onclick="nextPage()" id="nextBtn">下一页</button>
        </div>
    </div>
</div>

<script>
    let allWords = [];
    let currentFilter = 'all';
    let catalogStructure = [];
    let currentPageNum = 1;
    let pageSize = 10;
    let filteredWords = [];
    let speechSynth = window.speechSynthesis;
    let currentUtterance = null;
    let isReadingAll = false;
    let readAllIndex = 0;

    marked.setOptions({
        breaks: true,
        gfm: true
    });

    async function init() {
        try {
            const response = await fetch('/api/all-words');
            allWords = await response.json();
            console.log('✅ 加载单词数量:', allWords.length);

            buildCatalog();
            filteredWords = [...allWords];
            if (filteredWords.length > 0) {
                showPage(1);
            }
        } catch (error) {
            console.error('❌ 加载失败:', error);
            document.getElementById('catalogContainer').innerHTML =
                '<div class="no-data"><div class="icon">⚠️</div><p>加载失败，请刷新重试</p></div>';
        }
    }

    function buildCatalog() {
        const container = document.getElementById('catalogContainer');
        container.innerHTML = '';

        const structure = parseCatalogStructure();
        catalogStructure = structure;

        structure.forEach((level1) => {
            const level1Div = document.createElement('div');
            level1Div.className = 'catalog-level1';

            const level1Title = document.createElement('div');
            level1Title.className = 'catalog-level1-title';
            level1Title.innerHTML = `<span>${level1.title}</span><span class="arrow">▶</span>`;
            level1Title.onclick = () => {
                level1Title.classList.toggle('expanded');
                level1Div.querySelector('.catalog-level2-container').classList.toggle('expanded');
            };
            level1Div.appendChild(level1Title);

            const level2Container = document.createElement('div');
            level2Container.className = 'catalog-level2-container';

            level1.children.forEach((level2) => {
                const level2Div = document.createElement('div');
                level2Div.className = 'catalog-level2';

                const level2Title = document.createElement('div');
                level2Title.className = 'catalog-level2-title';
                level2Title.textContent = level2.title;
                level2Title.onclick = (e) => {
                    e.stopPropagation();
                    level2Div.querySelector('.catalog-words').classList.toggle('expanded');
                };
                level2Div.appendChild(level2Title);

                const wordsDiv = document.createElement('div');
                wordsDiv.className = 'catalog-words';

                level2.words.forEach(word => {
                    const wordItem = document.createElement('div');
                    wordItem.className = 'catalog-word-item';

                    const wordText = document.createElement('span');
                    wordText.textContent = `${word.number} ${word.word}`;

                    const speakIcon = document.createElement('span');
                    speakIcon.className = 'speak-icon';
                    speakIcon.textContent = '🔊';
                    speakIcon.onclick = (e) => {
                        e.stopPropagation();
                        speakWord(word.word);
                    };

                    wordItem.appendChild(wordText);
                    wordItem.appendChild(speakIcon);
                    wordItem.dataset.wordId = word.id;
                    wordItem.onclick = () => showWordDetail(word.id);
                    wordsDiv.appendChild(wordItem);
                });

                level2Div.appendChild(wordsDiv);
                level2Container.appendChild(level2Div);
            });

            level1Div.appendChild(level2Container);
            container.appendChild(level1Div);
        });
    }

    function parseCatalogStructure() {
        const structure = [];
        let currentLayer = null;
        let currentCategory = null;
        let seenLayers = new Set();
        let seenCategories = new Set();

        allWords.forEach(word => {
            if (!word.content) return;

            const layerMatch = word.content.match(/^####\s+(.+)/m);
            const categoryMatch = word.content.match(/^#####\s+(.+)/m);

            if (layerMatch) {
                const layerTitle = layerMatch[1];
                if (!seenLayers.has(layerTitle)) {
                    seenLayers.add(layerTitle);
                    currentLayer = {
                        title: layerTitle,
                        children: []
                    };
                    structure.push(currentLayer);
                    currentCategory = null;
                    seenCategories.clear();
                }
            } else if (categoryMatch && currentLayer) {
                const categoryTitle = categoryMatch[1];
                const catKey = currentLayer.title + '|' + categoryTitle;
                if (!seenCategories.has(catKey)) {
                    seenCategories.add(catKey);
                    currentCategory = {
                        title: categoryTitle,
                        words: []
                    };
                    currentLayer.children.push(currentCategory);
                } else {
                    currentCategory = currentLayer.children.find(c => c.title === categoryTitle);
                }
            }

            if (currentCategory) {
                const numberMatch = word.content.match(/^(?:\d{3})\s+\*\*(.+?)\*\*/m) ||
                    word.content.match(/^\*\*(\d+)\s+(.+?)\*\*/m);
                if (numberMatch) {
                    const num = word.content.match(/^(\d{3})/)?.[1] ||
                        word.content.match(/^\*\*(\d+)/)?.[1] || '';
                    const wordName = numberMatch[1] || numberMatch[2];
                    if (!currentCategory.words.some(w => w.id === word.id)) {
                        currentCategory.words.push({
                            id: word.id,
                            number: num,
                            word: wordName
                        });
                    }
                }
            }
        });

        console.log('📊 目录结构:', structure);
        console.log('📊 一级主题数量:', structure.length);
        return structure;
    }

    function speakWord(word) {
        if (speechSynth.speaking) {
            speechSynth.cancel();
        }
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        speechSynth.speak(utterance);
    }

    function toggleReadAll() {
        const btn = document.getElementById('readAllBtn');

        if (isReadingAll) {
            speechSynth.cancel();
            isReadingAll = false;
            btn.classList.remove('reading');
            btn.innerHTML = '🔊 全文朗读';
            return;
        }

        isReadingAll = true;
        readAllIndex = 0;
        btn.classList.add('reading');
        btn.innerHTML = '⏹️ 停止朗读';
        readNextWord();
    }

    function readNextWord() {
        if (!isReadingAll || readAllIndex >= filteredWords.length) {
            isReadingAll = false;
            const btn = document.getElementById('readAllBtn');
            btn.classList.remove('reading');
            btn.innerHTML = '🔊 全文朗读';
            return;
        }

        const word = filteredWords[readAllIndex];
        const utterance = new SpeechSynthesisUtterance(word.word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;

        utterance.onend = () => {
            if (isReadingAll) {
                readAllIndex++;
                setTimeout(readNextWord, 300);
            }
        };

        speechSynth.speak(utterance);
    }

    function showWordDetail(wordId) {
        const word = allWords.find(w => w.id === wordId);
        if (!word) return;

        document.querySelectorAll('.catalog-word-item').forEach(item => {
            item.classList.remove('active');
        });
        const activeItem = document.querySelector(`[data-word-id="${wordId}"]`);
        if (activeItem) {
            activeItem.classList.add('active');
            activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        renderWordContent(word);
        document.getElementById('pagination').style.display = 'none';
    }

    function renderWordContent(word) {
        const contentBody = document.getElementById('contentBody');
        const contentTitle = document.getElementById('contentTitle');

        const numberMatch = word.content.match(/^(\d{3})/);
        const number = numberMatch ? numberMatch[1] : '';

        contentTitle.textContent = '单词详情';

        const card = document.createElement('div');
        card.className = 'word-card';

        const header = document.createElement('div');
        header.style.marginBottom = '20px';
        header.style.borderBottom = '2px solid #e4e7ed';
        header.style.paddingBottom = '15px';

        const wordTitle = document.createElement('div');
        wordTitle.className = 'word-title';

        if (number) {
            const numberBadge = document.createElement('span');
            numberBadge.className = 'word-number';
            numberBadge.textContent = number;
            wordTitle.appendChild(numberBadge);
        }

        const wordText = document.createElement('span');
        wordText.textContent = `${word.word} ${word.pronunciation || ''}`;
        wordTitle.appendChild(wordText);

        const speakBtn = document.createElement('button');
        speakBtn.className = 'speak-btn';
        speakBtn.innerHTML = '🔊 朗读';
        speakBtn.onclick = () => speakWord(word.word);
        wordTitle.appendChild(speakBtn);

        header.appendChild(wordTitle);

        if (word.definition) {
            const wordMeta = document.createElement('div');
            wordMeta.className = 'word-meta';
            wordMeta.style.marginTop = '10px';
            wordMeta.textContent = word.definition;
            header.appendChild(wordMeta);
        }

        const markdownContent = document.createElement('div');
        markdownContent.className = 'markdown-content';

        let content = word.content || '';
        const htmlContent = marked.parse(content);
        markdownContent.innerHTML = htmlContent;

        card.appendChild(header);
        card.appendChild(markdownContent);

        contentBody.innerHTML = '';
        contentBody.appendChild(card);
    }

    function showPage(page) {
        const totalPages = Math.ceil(filteredWords.length / pageSize);
        if (totalPages === 0) {
            document.getElementById('pagination').style.display = 'none';
            return;
        }

        if (page < 1) page = 1;
        if (page > totalPages) page = totalPages;

        currentPageNum = page;
        const start = (page - 1) * pageSize;
        const end = start + pageSize;
        const pageWords = filteredWords.slice(start, end);

        renderContent(pageWords);

        document.getElementById('currentPage').textContent = page;
        document.getElementById('totalPages').textContent = totalPages;
        document.getElementById('prevBtn').disabled = page === 1;
        document.getElementById('nextBtn').disabled = page === totalPages;
        document.getElementById('pagination').style.display = 'flex';
    }

    function prevPage() {
        if (currentPageNum > 1) {
            showPage(currentPageNum - 1);
        }
    }

    function nextPage() {
        const totalPages = Math.ceil(filteredWords.length / pageSize);
        if (currentPageNum < totalPages) {
            showPage(currentPageNum + 1);
        }
    }

    function jumpToPage() {
        const input = document.getElementById('jumpPage');
        const page = parseInt(input.value);
        const totalPages = Math.ceil(filteredWords.length / pageSize);

        if (page >= 1 && page <= totalPages) {
            showPage(page);
            input.value = '';
        } else {
            alert(`请输入 1-${totalPages} 之间的页码`);
        }
    }

    function renderContent(words) {
        const contentBody = document.getElementById('contentBody');
        contentBody.innerHTML = '';

        if (words.length === 0) {
            contentBody.innerHTML = `
                <div class="no-data">
                    <div class="icon">🔍</div>
                    <p>没有找到匹配的单词</p>
                </div>
            `;
            return;
        }

        words.forEach(word => {
            const card = document.createElement('div');
            card.className = 'word-card';

            const numberMatch = word.content.match(/^(\d{3})/);
            const number = numberMatch ? numberMatch[1] : '';

            const header = document.createElement('div');
            header.style.marginBottom = '15px';

            const wordTitle = document.createElement('div');
            wordTitle.className = 'word-title';

            if (number) {
                const numberBadge = document.createElement('span');
                numberBadge.className = 'word-number';
                numberBadge.textContent = number;
                wordTitle.appendChild(numberBadge);
            }

            const wordText = document.createElement('span');
            wordText.textContent = `${word.word} ${word.pronunciation || ''}`;
            wordTitle.appendChild(wordText);

            const speakBtn = document.createElement('button');
            speakBtn.className = 'speak-btn';
            speakBtn.innerHTML = '🔊 朗读';
            speakBtn.onclick = () => speakWord(word.word);
            wordTitle.appendChild(speakBtn);

            header.appendChild(wordTitle);
            card.appendChild(header);

            const markdownContent = document.createElement('div');
            markdownContent.className = 'markdown-content';
            markdownContent.innerHTML = marked.parse(word.content ||
                `单词：${word.word} | 释义：${word.definition || ''}`);

            card.appendChild(markdownContent);
            contentBody.appendChild(card);
        });
    }

    let searchTimer = null;
    function handleSearch(keyword) {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            if (!keyword.trim()) {
                handleFilter(currentFilter);
                return;
            }

            filteredWords = allWords.filter(w =>
                w.word.toLowerCase().includes(keyword.toLowerCase()) ||
                (w.definition && w.definition.toLowerCase().includes(keyword.toLowerCase())) ||
                (w.content && w.content.toLowerCase().includes(keyword.toLowerCase()))
            );

            document.getElementById('contentTitle').textContent =
                `搜索结果：${filteredWords.length} 个单词`;
            showPage(1);
        }, 300);
    }

    function handleFilter(value) {
        currentFilter = value;

        if (value === 'all') {
            filteredWords = [...allWords];
        } else {
            const layerMap = {
                'layer1': '一、基础必备层',
                'layer2': '二、核心高频层',
                'layer3': '三、高频进阶层',
                'layer4': '四、低频储备层'
            };

            const layerKeyword = layerMap[value];
            filteredWords = allWords.filter(word => {
                if (!word.content) return false;
                return word.content.includes(layerKeyword);
            });
        }

        const titleMap = {
            'all': '全部单词',
            'layer1': '一、基础必备层（800词）',
            'layer2': '二、核心高频层（2000词）',
            'layer3': '三、高频进阶层（1200词）',
            'layer4': '四、低频储备层（1000词）'
        };

        document.getElementById('contentTitle').textContent = titleMap[value];
        currentPageNum = 1;

        if (filteredWords.length === 0) {
            document.getElementById('contentBody').innerHTML = `
                <div class="no-data">
                    <div class="icon">🔍</div>
                    <p>该分类下暂无单词</p>
                </div>
            `;
            document.getElementById('pagination').style.display = 'none';
        } else {
            showPage(1);
        }
    }

    init();
</script>
</body>
</html>
