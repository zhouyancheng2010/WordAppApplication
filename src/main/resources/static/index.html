<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词学习系统</title>
    <script src="js/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            background: white;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #e4e7ed;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: width 0.3s ease;
        }


        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e4e7ed;
            background: white;
        }

        .sidebar-header h1 {
            font-size: 18px;
            color: #303133;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .search-box-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            opacity: 0.5;
        }

        .catalog-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .catalog-node {
            margin-bottom: 5px;
        }

        .catalog-title {
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            transition: all 0.2s;
            font-size: 14px;
            color: #606266;
            gap: 8px;
        }

        .catalog-title:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .catalog-title.expanded {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            font-weight: 500;
        }

        .catalog-title-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .arrow {
            font-size: 10px;
            transition: transform 0.3s;
            order: -1;
        }

        .catalog-title.expanded .arrow {
            transform: rotate(90deg);
        }


        .catalog-children {
            display: none;
            padding-left: 15px;
        }

        .catalog-children.expanded {
            display: block;
        }

        .catalog-word-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            margin: 3px 0;
            font-size: 13px;
            color: #606266;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .catalog-word-item:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .catalog-word-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .word-number-badge {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            color: #667eea;
            min-width: 30px;
            text-align: center;
        }

        .catalog-word-item.active .word-number-badge {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .word-pronunciation-nav {
            font-size: 11px;
            color: #909399;
            opacity: 0.8;
        }

        .catalog-word-item.active .word-pronunciation-nav {
            color: rgba(255, 255, 255, 0.9);
        }

        .word-definition {
            font-size: 11px;
            color: #909399;
            opacity: 0.7;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .catalog-word-item.active .word-definition {
            color: rgba(255, 255, 255, 0.85);
        }

        .speak-icon {
            cursor: pointer;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.2s;
            margin-left: auto;
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            background: url('ico/speaker03.png') no-repeat center;
            background-size: contain;
        }

        .catalog-word-item:hover .speak-icon {
            opacity: 0.7;
        }

        .speak-icon:hover {
            opacity: 1 !important;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .content-header {
            padding: 20px 30px;
            border-bottom: 1px solid #e4e7ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .content-header h2 {
            font-size: 20px;
            color: #303133;
            font-weight: 600;
        }

        .filter-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-controls select {
            padding: 8px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            background: white;
        }

        .export-group {
            display: flex;
            gap: 5px;
        }

        .export-btn {
            padding: 8px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .read-all-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #67c23a 0%, #529b2e 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .read-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(103, 194, 58, 0.4);
        }

        .read-all-btn.reading {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
        }

        .context-menu {
            position: fixed;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            padding: 8px 0;
            z-index: 1000;
            display: none;
            min-width: 180px;
        }

        .context-menu-item {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-menu-item:hover {
            background: #f5f7fa;
            color: #667eea;
        }

        .highlight-word {
            background: linear-gradient(120deg, #ffeaa7 0%, #ffeaa7 100%);
            background-repeat: no-repeat;
            background-size: 100% 40%;
            background-position: 0 88%;
            transition: background 0.3s;
        }

        .reading-current {
            background: linear-gradient(120deg, #74b9ff 0%, #74b9ff 100%);
            background-repeat: no-repeat;
            background-size: 100% 40%;
            background-position: 0 88%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e4e7ed;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .wordbook-btn {
            padding: 6px 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .wordbook-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 6px rgba(245, 87, 108, 0.4);
        }

        .ai-explain-btn {
            padding: 6px 12px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .ai-explain-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 6px rgba(79, 172, 254, 0.4);
        }

        .back-btn {
            padding: 8px 16px;
            background: #909399;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #73767a;
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #fafafa;
        }

        .word-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: all 0.3s;
        }

        .word-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }

        .word-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .word-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .word-name {
            font-size: 32px;
            font-weight: bold;
            color: #303133;
        }

        .word-pronunciation {
            font-size: 18px;
            color: #909399;
        }

        .speak-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .speak-btn::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            background: url('ico/speaker03.png') no-repeat center;
            background-size: contain;
            filter: brightness(0) invert(1);
        }

        .speak-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }


        .speak-btn:hover::before {
            filter: brightness(0) invert(1);
        }


        .word-meta {
            font-size: 16px;
            color: #606266;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .markdown-content {
            font-size: 14px;
            line-height: 1.8;
            color: #606266;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4,
        .markdown-content h5,
        .markdown-content h6 {
            margin: 20px 0 10px 0;
            color: #303133;
            font-weight: 600;
        }

        .markdown-content p {
            margin: 10px 0;
        }

        .markdown-content strong {
            color: #303133;
            font-weight: 600;
        }

        .word-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e4e7ed;
        }

        .nav-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-info {
            font-size: 14px;
            color: #909399;
        }

        .pagination {
            padding: 20px 30px;
            border-top: 1px solid #e4e7ed;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: white;
        }

        .pagination button {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 14px;
            color: #606266;
        }

        .jump-input {
            width: 60px;
            padding: 8px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }

        .jump-btn {
            padding: 8px 16px;
            background: #909399;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
        }

        .no-data .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #909399;
        }

        .sidebar-resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            cursor: col-resize;
            background: transparent;
            transition: background 0.2s;
        }

        .sidebar-resize-handle:hover,
        .sidebar-resize-handle.active {
            background: rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
                height: 95vh;
            }

            .sidebar {
                width: 100%;
                height: 40%;
                border-right: none;
                border-bottom: 1px solid #e4e7ed;
            }

            .content-area {
                height: 60%;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1><img src="ico/book01.png" alt="book" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 8px;">13000英语4500词</h1>
            <div class="search-box">
                <img src="ico/search02.png" alt="search" class="search-box-icon">
                <input type="text" id="searchInput" placeholder="搜索单词..." oninput="handleSearch(this.value)">
            </div>
        </div>
        <div class="catalog-container" id="catalogContainer">
            <div class="loading">加载中...</div>
        </div>
        <div class="sidebar-resize-handle" id="resizeHandle"></div>
    </div>

    <div class="content-area">
        <div class="content-header">
            <h2 id="contentTitle">单词详情</h2>
            <div class="filter-controls">
                <button class="read-all-btn" id="readAllBtn" onclick="toggleReadAll()">全文朗读</button>
                <button class="wordbook-btn" onclick="showWordBook()">📚 生词本</button>
                <div class="export-group">
                    <button class="export-btn" onclick="exportFile('md')">📄 MD</button>
                    <button class="export-btn" onclick="exportFile('pdf')">📕 PDF</button>
                    <button class="export-btn" onclick="exportFile('word')">📘 Word</button>
                    <button class="export-btn" onclick="exportFile('excel')">📗 Excel</button>
                </div>
                <button id="backToListBtn" class="back-btn" onclick="backToList()">返回列表</button>
                <select id="filterSelect" onchange="handleFilter(this.value)">
                    <option value="all">全部显示</option>
                    <option value="layer1">一、基础必备层（800词）</option>
                    <option value="layer2">二、核心高频层（2000词）</option>
                    <option value="layer3">三、高频进阶层（1200词）</option>
                    <option value="layer4">四、低频储备层（1000词）</option>
                </select>
            </div>
        </div>
        <div class="content-body" id="contentBody">
            <div class="no-data">
                <div class="icon">📖</div>
                <p>请从左侧目录选择单词</p>
            </div>
        </div>
        <div class="pagination" id="pagination" style="display: none;">
            <button onclick="prevPage()" id="prevBtn">上一页</button>
            <span class="page-info">第 <span id="currentPage">1</span> / <span id="totalPages">1</span> 页</span>
            <input type="number" class="jump-input" id="jumpPage" min="1" placeholder="页码">
            <button class="jump-btn" onclick="jumpToPage()">跳转</button>
            <button onclick="nextPage()" id="nextBtn">下一页</button>
        </div>
    </div>
</div>

<div class="context-menu" id="contextMenu">
    <div class="context-menu-item" onclick="startReadingFromHere()">
        <span>▶️</span> 从此处开始朗读
    </div>
    <div class="context-menu-item" onclick="addToWordBook()">
        <span>📚</span> 加入/移除生词本
    </div>
    <div class="context-menu-item" onclick="aiExplainWord()">
        <span>🤖</span> AI智能解释
    </div>
    <div class="context-menu-item" onclick="startShadowing()">
        <span>🎤</span> AI跟读评分
    </div>
</div>

<script>
    let allWords = [];
    let catalogStructure = [];
    let filteredWords = [];
    let currentFilter = 'all';
    let currentPage = 1;
    let pageSize = 10;
    let currentView = 'list';
    let currentDetailIndex = -1;
    let lastListPosition = { page: 1, scrollTop: 0 };
    let speechSynth = window.speechSynthesis;
    let isReadingAll = false;
    let readAllIndex = 0;
    let expandedNodes = new Set();

    // 新增功能变量
    let wordBook = JSON.parse(localStorage.getItem('wordBook') || '[]');
    let learningProgress = JSON.parse(localStorage.getItem('learningProgress') || '{}');
    let contextMenuWord = null;
    let contextMenuIndex = null;

    marked.setOptions({ breaks: true, gfm: true });

    async function init() {
        try {
            console.log('🔄 开始加载数据...');

            const wordsRes = await fetch('/api/all-words');
            if (!wordsRes.ok) {
                throw new Error(`all-words API 请求失败: ${wordsRes.status}`);
            }

            const catalogRes = await fetch('/api/catalog');
            if (!catalogRes.ok) {
                throw new Error(`catalog API 请求失败: ${catalogRes.status}`);
            }

            allWords = await wordsRes.json();
            catalogStructure = await catalogRes.json();

            console.log('\u2705 \u52a0\u8f7d\u5b8c\u6210:', allWords.length, '\u4e2a\u5355\u8bcd');

            const numberMap = buildNumberMap(catalogStructure);
            allWords = allWords.map(word => {
                const key = word.word.toLowerCase();
                if (numberMap[key]) {
                    word.number = numberMap[key];
                } else if (word.content) {
                    const match = word.content.match(/^(\d{3})/);
                    if (match) {
                        word.number = match[1];
                    }
                }
                return word;
            });

            renderCatalog(catalogStructure);
            filteredWords = [...allWords];
            if (filteredWords.length > 0) showPage(1);

            restoreLearningProgress();
        } catch (error) {
            console.error('\u274c \u52a0\u8f7d\u5931\u8d25:', error);
            document.getElementById('catalogContainer').innerHTML =
                '<div class="no-data">' +
                '<div class="icon">\u26a0\ufe0f</div>' +
                '<p>\u52a0\u8f7d\u5931\u8d25</p>' +
                '<p style="font-size: 12px; color: #999; margin-top: 10px;">' + error.message + '</p>' +
                '<p style="font-size: 12px; color: #667eea; margin-top: 15px; cursor: pointer;" onclick="location.reload()">点击刷新重试</p>' +
                '</div>';
        }
    }

    function buildNumberMap(nodes, map = {}) {
        for (const node of nodes) {
            if (node.words) {
                for (const word of node.words) {
                    if (word.word && word.number) {
                        map[word.word.toLowerCase()] = word.number;
                    }
                }
            }
            if (node.children) {
                buildNumberMap(node.children, map);
            }
        }
        return map;
    }

    function renderCatalog(nodes, level = 1, container = null) {
        if (!container) {
            container = document.getElementById('catalogContainer');
            container.innerHTML = '';
            if (!nodes || nodes.length === 0) {
                container.innerHTML = '<div class="no-data"><div class="icon">\ud83d\udcc2</div><p>\u6682\u65e0\u6570\u636e</p></div>';
                return;
            }
        }

        const fragment = document.createDocumentFragment();

        for (const node of nodes) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = `catalog-node level-${Math.min(level, 6)}`;

            const titleDiv = document.createElement('div');
            titleDiv.className = 'catalog-title';

            const hasChildren = node.children && node.children.length > 0;
            const hasWords = node.words && node.words.length > 0;
            const isExpandable = hasChildren || hasWords;
            const nodeId = `node-${level}-${node.title}`;

            if (isExpandable) {
                const textSpan = document.createElement('span');
                textSpan.className = 'catalog-title-text';
                textSpan.textContent = node.title;
                titleDiv.appendChild(textSpan);

                const arrowSpan = document.createElement('span');
                arrowSpan.className = 'arrow';
                arrowSpan.textContent = '\u25b6';
                titleDiv.appendChild(arrowSpan);

                const isExpanded = expandedNodes.has(nodeId) || level === 1;
                if (isExpanded) {
                    titleDiv.classList.add('expanded');
                }

                titleDiv.onclick = (e) => {
                    e.stopPropagation();
                    const isNowExpanded = titleDiv.classList.toggle('expanded');
                    const childrenDiv = nodeDiv.querySelector('.catalog-children');
                    if (childrenDiv) childrenDiv.classList.toggle('expanded');

                    if (isNowExpanded) {
                        expandedNodes.add(nodeId);
                    } else {
                        expandedNodes.delete(nodeId);
                    }
                };
            } else {
                const textSpan = document.createElement('span');
                textSpan.className = 'catalog-title-text';
                textSpan.textContent = node.title;
                titleDiv.appendChild(textSpan);
                titleDiv.style.cursor = 'default';
            }

            nodeDiv.appendChild(titleDiv);

            if (isExpandable) {
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'catalog-children';

                const isExpanded = expandedNodes.has(nodeId) || level === 1;
                if (isExpanded) {
                    childrenContainer.classList.add('expanded');
                }

                if (hasChildren) {
                    renderCatalog(node.children, level + 1, childrenContainer);
                }

                if (hasWords) {
                    for (const word of node.words) {
                        const wordItem = createWordItem(word);
                        childrenContainer.appendChild(wordItem);
                    }
                }

                nodeDiv.appendChild(childrenContainer);
            }

            fragment.appendChild(nodeDiv);
        }

        container.appendChild(fragment);
    }

    function createWordItem(word) {
        const wordItem = document.createElement('div');
        wordItem.className = 'catalog-word-item';

        const leftSpan = document.createElement('span');
        leftSpan.style.whiteSpace = 'nowrap';
        const numberSpan = document.createElement('span');
        numberSpan.className = 'word-number-badge';
        numberSpan.textContent = word.number || String(word.sortOrder).padStart(3, '0');
        leftSpan.appendChild(numberSpan);
        leftSpan.appendChild(document.createTextNode(' ' + word.word));

        const speakIcon = document.createElement('span');
        speakIcon.className = 'speak-icon';
        speakIcon.title = '朗读';
        speakIcon.onclick = (e) => {
            e.stopPropagation();
            speakWord(word.word);
        };

        wordItem.appendChild(leftSpan);

        if (word.pronunciation) {
            const pronunciationSpan = document.createElement('span');
            pronunciationSpan.className = 'word-pronunciation-nav';
            pronunciationSpan.textContent = word.pronunciation;
            wordItem.appendChild(pronunciationSpan);
        }

        if (word.definition) {
            const definitionSpan = document.createElement('span');
            definitionSpan.className = 'word-definition';
            definitionSpan.textContent = word.definition;
            wordItem.appendChild(definitionSpan);
        }

        wordItem.appendChild(speakIcon);

        wordItem.dataset.wordId = word.id || '';
        wordItem.dataset.wordName = word.word;
        wordItem.dataset.sortOrder = word.sortOrder;
        wordItem.dataset.number = word.number || '';

        wordItem.onclick = () => {
            if (word.id) {
                showWordById(word.id);
            } else if (word.number) {
                showWordByNumber(word.number, word.word);
            } else {
                showWordBySortOrder(word.sortOrder);
            }
        };

        wordItem.oncontextmenu = (e) => {
            e.preventDefault();
            showContextMenu(e, word);
        };

        return wordItem;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function readNextWord() {
        if (!isReadingAll || readAllIndex >= filteredWords.length) {
            toggleReadAll();
            return;
        }

        const word = filteredWords[readAllIndex];

        if (!word) {
            console.error('单词不存在，索引:', readAllIndex);
            toggleReadAll();
            return;
        }

        const number = word.number || String(word.sortOrder).padStart(3, '0');

        let chineseDefinition = '';
        if (word.definition) {
            const match = word.definition.match(/^[a-z]+\.\s*(.+)/);
            if (match && match[1]) {
                chineseDefinition = match[1].trim();
            } else {
                chineseDefinition = word.definition.trim();
            }
        }

        const numberChars = {
            '0': '零', '1': '一', '2': '二', '3': '三', '4': '四',
            '5': '五', '6': '六', '7': '七', '8': '八', '9': '九'
        };
        const numberText = number.split('').map(char => numberChars[char] || char).join(' ');

        let repeatCount = 0;
        const maxRepeats = 2;

        highlightCurrentWord(readAllIndex);

        function speakCurrent() {
            if (!isReadingAll) return;

            if (repeatCount < maxRepeats) {
                speakWithPauses(numberText, word.word, chineseDefinition, () => {
                    repeatCount++;
                    if (repeatCount < maxRepeats) {
                        setTimeout(() => {
                            if (isReadingAll) speakCurrent();
                        }, 2000);
                    } else {
                        readAllIndex++;
                        setTimeout(() => {
                            if (isReadingAll) readNextWord();
                        }, 500);
                    }
                });
            } else {
                readAllIndex++;
                setTimeout(readNextWord, 500);
            }
        }

        speakCurrent();
    }


    function highlightCurrentWord(index) {
        document.querySelectorAll('.reading-current').forEach(el => {
            el.classList.remove('reading-current');
        });

        if (index >= 0 && index < filteredWords.length) {
            const word = filteredWords[index];
            const wordElement = document.querySelector(`.catalog-word-item[data-word-id="${word.id}"]`) ||
                document.querySelector(`.catalog-word-item[data-word-name="${word.word}"]`);
            if (wordElement) {
                wordElement.classList.add('reading-current');
                wordElement.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
        }
    }


    function speakWithPauses(numberText, word, definition, callback) {
        if (!isReadingAll) {
            if (callback) callback();
            return;
        }

        const numberUtterance = new SpeechSynthesisUtterance(numberText);
        numberUtterance.lang = 'zh-CN';
        numberUtterance.rate = 0.8;

        numberUtterance.onend = () => {
            if (!isReadingAll) {
                if (callback) callback();
                return;
            }

            setTimeout(() => {
                if (!isReadingAll) {
                    if (callback) callback();
                    return;
                }

                const wordUtterance = new SpeechSynthesisUtterance(word);
                wordUtterance.lang = 'en-US';
                wordUtterance.rate = 0.8;

                wordUtterance.onend = () => {
                    if (!isReadingAll) {
                        if (callback) callback();
                        return;
                    }

                    setTimeout(() => {
                        if (!isReadingAll) {
                            if (callback) callback();
                            return;
                        }

                        if (definition && definition.trim()) {
                            const defUtterance = new SpeechSynthesisUtterance(definition);
                            defUtterance.lang = 'zh-CN';
                            defUtterance.rate = 0.8;

                            defUtterance.onend = () => {
                                if (callback) callback();
                            };

                            speechSynth.speak(defUtterance);
                        } else {
                            if (callback) callback();
                        }
                    }, 1000);
                };

                speechSynth.speak(wordUtterance);
            }, 1000);
        };

        speechSynth.speak(numberUtterance);
    }

    function showPage(page) {

            document.getElementById('contentBody').innerHTML = '<div class="no-data"><div class="icon">🔍</div><p>没有找到单词</p></div>';

        page = Math.min(Math.max(1, page), total);

        const start = (page - 1) * pageSize;

        renderWordList(filteredWords.slice(start, end));

        document.getElementById('currentPage').textContent = page;

    let searchTimer;
    function handleSearch(keyword) {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            if (!keyword.trim()) {
                handleFilter(currentFilter);
                return;
            }
            const kw = keyword.toLowerCase().trim();
            const exact = allWords.find(w => w.word.toLowerCase() === kw);
            if (exact) {
                lastListPosition = { page: currentPage, scrollTop: document.getElementById('contentBody').scrollTop };
                showWordById(exact.id);
                return;
            }
            filteredWords = allWords.filter(w =>
                w.word.toLowerCase().includes(kw) ||
                (w.definition && w.definition.toLowerCase().includes(kw)) ||
                (w.content && w.content.toLowerCase().includes(kw))
            );
            document.getElementById('contentTitle').textContent = `搜索结果：${filteredWords.length} 个单词`;
            document.getElementById('backToListBtn').style.display = 'none';
            currentPage = 1;
            showPage(1);
        }, 300);
    }

    function handleFilter(value) {
        currentFilter = value;
        document.getElementById('backToListBtn').style.display = 'none';

        if (value === 'all') {
            filteredWords = [...allWords];
            document.getElementById('contentTitle').textContent = '全部单词';
        } else {
            const map = { layer1: '一、基础必备层', layer2: '二、核心高频层', layer3: '三、高频进阶层', layer4: '四、低频储备层' };
            const keyword = map[value];
            filteredWords = allWords.filter(w => w.layer1 && w.layer1.includes(keyword));
            const titles = { layer1: '🌟 一、基础必备层（800词）', layer2: '⭐ 二、核心高频层（2000词）', layer3: '✨ 三、高频进阶层（1200词）', layer4: '💫 四、低频储备层（1000词）' };
            document.getElementById('contentTitle').textContent = titles[value];
        }

        currentPage = 1;
        if (filteredWords.length === 0) {
            document.getElementById('contentBody').innerHTML = '<div class="no-data"><div class="icon">🔍</div><p>该分类下暂无单词</p></div>';

    function initResizeHandle() {
        const sidebar = document.querySelector('.sidebar');
        const resizeHandle = document.getElementById('resizeHandle');
        let isResizing = false;
        let startX = 0;
        let startWidth = 0;

        resizeHandle.addEventListener('mousedown', (e) => {
            isResizing = true;
            startX = e.clientX;
            startWidth = sidebar.offsetWidth;
            resizeHandle.classList.add('active');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const newWidth = startWidth + (e.clientX - startX);
            const minWidth = 280;
            const maxWidth = 600;
            if (newWidth >= minWidth && newWidth <= maxWidth) {
                sidebar.style.width = newWidth + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                resizeHandle.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });
    }

    function toggleWordBookForWord(word) {

        if (existingIndex >= 0) {
            wordBook.splice(existingIndex, 1);
            localStorage.setItem('wordBook', JSON.stringify(wordBook));
            alert(`已从生词本移除: ${word.word}`);
        } else {
            wordBook.push({
                id: word.id,
                word: word.word,
                pronunciation: word.pronunciation,
                definition: word.definition,
                number: word.number,
                addedAt: new Date().toISOString()
            });

    async function aiExplainWordForWord(word) {
        try {
            const response = await fetch('/api/ai/explain', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ word: word.word })
            });

            if (response.ok) {
                const data = await response.json();
                showAIExplanation(data);
            } else {
                showMockExplanation(word);
            }
        } catch (error) {
            console.error('AI解释失败:', error);
            showMockExplanation(word);
        }
    }

    function showAIExplanation(data) {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;display:flex;justify-content:center;align-items:center;';
        modal.innerHTML = `
            <div style="background:white;border-radius:12px;padding:30px;max-width:600px;max-height:80vh;overflow-y:auto;">
                <h3 style="margin-bottom:20px;color:#667eea;">🤖 AI智能解释 - ${data.word}</h3>
                <div style="line-height:1.8;">
                    <p><strong>基本含义:</strong> ${data.basicMeaning}</p>
                    <p><strong>使用场景:</strong></p>
                    <ul>${data.usageScenarios.map(s => `<li>${s}</li>`).join('')}</ul>
                    <p><strong>记忆技巧:</strong> ${data.memoryTips}</p>
                    <p><strong>常见错误:</strong> ${data.commonErrors}</p>
                    <p><strong>扩展学习:</strong> ${data.extendedLearning}</p>
                    <p style="color:#999;font-size:12px;margin-top:20px;">来源: ${data.source}</p>
                </div>
                <button onclick="this.parentElement.parentElement.remove()" style="margin-top:20px;padding:10px 20px;background:#667eea;color:white;border:none;border-radius:6px;cursor:pointer;">关闭</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.onclick = (e) => {
            if (e.target === modal) modal.remove();
        };
    }

    function showMockExplanation(word) {
        const explanation = `**${word.word}** 的智能解释：

**基本含义**: ${word.definition || '暂无'}

**使用场景**:
- 日常对话中常用
- 学术写作中适用
- 商务场合可使用

**记忆技巧**:
可以通过词根词缀法记忆，或者通过例句联想记忆。

**常见错误**:
注意与其他相似词的区分。

**扩展学习**:
建议学习相关的同义词和反义词，扩大词汇量。`;

        alert(explanation);
    }

    // AI跟读评分功能 - 简化实现版
    function startShadowing() {
        hideContextMenu();

        const word = contextMenuWord || filteredWords[currentDetailIndex];
        if (!word) {
            alert('请先选择一个单词');
            return;
        }

        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            alert('您的浏览器不支持语音识别功能，请使用Chrome浏览器');
            return;
        }

        // 创建录音界面
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;display:flex;justify-content:center;align-items:center;';
        modal.innerHTML = `
            <div style="background:white;border-radius:12px;padding:30px;max-width:500px;text-align:center;">
                <h3 style="margin-bottom:20px;color:#667eea;">🎤 AI跟读评分</h3>
                <p style="margin-bottom:20px;">请朗读单词: <strong style="font-size:24px;color:#303133;">${word.word}</strong></p>
                <p style="color:#909399;margin-bottom:20px;">音标: ${word.pronunciation || '暂无'}</p>
                <button id="startRecord" style="padding:12px 24px;background:#67c23a;color:white;border:none;border-radius:6px;cursor:pointer;font-size:16px;margin:10px;">开始录音</button>
                <button id="stopRecord" style="padding:12px 24px;background:#f56565;color:white;border:none;border-radius:6px;cursor:pointer;font-size:16px;margin:10px;display:none;">停止录音</button>
                <div id="recordingStatus" style="margin-top:20px;color:#667eea;"></div>
                <button onclick="this.parentElement.parentElement.remove()" style="margin-top:20px;padding:10px 20px;background:#909399;color:white;border:none;border-radius:6px;cursor:pointer;">取消</button>
            </div>
        `;
        document.body.appendChild(modal);

        const startBtn = modal.querySelector('#startRecord');
        const stopBtn = modal.querySelector('#stopRecord');
        const statusDiv = modal.querySelector('#recordingStatus');

        let recognition;
        try {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                statusDiv.textContent = '正在录音...请朗读单词';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const confidence = event.results[0][0].confidence;

                // 计算评分
                const score = Math.round(confidence * 100);
                const accuracy = Math.min(score + 5, 100);
                const fluency = Math.min(score, 100);

                showShadowingResult(word.word, transcript, score, accuracy, fluency);
                modal.remove();
            };

            recognition.onerror = (event) => {
                statusDiv.textContent = '录音出错: ' + event.error;
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            };

            recognition.onend = () => {
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            };

            startBtn.onclick = () => {
                recognition.start();
            };

            stopBtn.onclick = () => {
                recognition.stop();
            };

        } catch (error) {
            statusDiv.textContent = '语音识别初始化失败: ' + error.message;
        }
    }

    function showShadowingResult(word, transcript, overallScore, accuracy, fluency) {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;display:flex;justify-content:center;align-items:center;';

        let grade = '';
        let gradeColor = '';
        if (overallScore >= 90) {
            grade = '优秀';
            gradeColor = '#67c23a';
        } else if (overallScore >= 75) {
            grade = '良好';
            gradeColor = '#409eff';
        } else if (overallScore >= 60) {
            grade = '及格';
            gradeColor = '#e6a23c';
        } else {
            grade = '需改进';
            gradeColor = '#f56565';
        }

        modal.innerHTML = `
            <div style="background:white;border-radius:12px;padding:30px;max-width:500px;">
                <h3 style="margin-bottom:20px;color:#667eea;">🎯 评分结果</h3>
                <div style="text-align:center;margin-bottom:20px;">
                    <div style="font-size:48px;font-weight:bold;color:${gradeColor};">${overallScore}分</div>
                    <div style="font-size:20px;color:${gradeColor};margin-top:10px;">${grade}</div>
                </div>
                <div style="line-height:2;">
                    <p><strong>目标单词:</strong> ${word}</p>
                    <p><strong>识别结果:</strong> ${transcript}</p>
                    <p><strong>准确度:</strong> ${accuracy}%</p>
                    <p><strong>流畅度:</strong> ${fluency}%</p>
                </div>
                <div style="margin-top:20px;padding:15px;background:#f5f7fa;border-radius:6px;">
                    <p style="color:#606266;"><strong>建议:</strong></p>
                    <ul style="margin-left:20px;color:#606266;">
                        ${overallScore < 80 ? '<li>注意发音的准确性</li>' : ''}
                        ${overallScore < 70 ? '<li>多听原声，模仿发音</li>' : ''}
                        <li>继续练习，保持进步！</li>
                    </ul>
                </div>
                <button onclick="this.parentElement.parentElement.remove()" style="margin-top:20px;padding:10px 20px;background:#667eea;color:white;border:none;border-radius:6px;cursor:pointer;width:100%;">关闭</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.onclick = (e) => {
            if (e.target === modal) modal.remove();
        };
    }

    // 学习进度保存与恢复
    function saveLearningProgress(wordId) {
        learningProgress.lastVisitedWord = wordId;
        learningProgress.lastVisitTime = new Date().toISOString();
        learningProgress.totalWords = allWords.length;
        learningProgress.viewedWords = learningProgress.viewedWords || [];

        if (!learningProgress.viewedWords.includes(wordId)) {
            learningProgress.viewedWords.push(wordId);
        }

        localStorage.setItem('learningProgress', JSON.stringify(learningProgress));
    }

    function restoreLearningProgress() {
        if (learningProgress.lastVisitedWord) {
            console.log('上次学习到单词ID:', learningProgress.lastVisitedWord);
            console.log('已学习单词数:', learningProgress.viewedWords ? learningProgress.viewedWords.length : 0);
        }
    }

    function calculateProgress() {
        if (!learningProgress.viewedWords || learningProgress.viewedWords.length === 0) {
            return 0;
        }
        const progress = (learningProgress.viewedWords.length / allWords.length) * 100;
        return Math.min(progress, 100);
    }

    // 初始化
    window.onload = () => {
        init();
        initResizeHandle();
    };
</script>
</body>
</html>
