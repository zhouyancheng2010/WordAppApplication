<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13000英语4500词</title>
    <link rel="icon" type="image/png" href="ico/book01.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 350px;
            min-width: 280px;
            max-width: 600px;
            background: #fff;
            border-right: 1px solid #e4e7ed;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .sidebar-resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            cursor: col-resize;
            background: transparent;
            z-index: 10;
            transition: background 0.2s;
        }

        .sidebar-resize-handle:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .sidebar-resize-handle.active {
            background: rgba(102, 126, 234, 0.5);
        }

        @media (max-width: 768px) {
            .sidebar-resize-handle {
                width: 100%;
                height: 15px;
                right: 0;
                left: 0;
                top: auto;
                bottom: 0;
                cursor: row-resize;
                background: transparent;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .sidebar-resize-handle::after {
                content: '';
                width: 40px;
                height: 4px;
                background: rgba(102, 126, 234, 0.3);
                border-radius: 2px;
            }

            .sidebar-resize-handle:hover::after {
                background: rgba(102, 126, 234, 0.6);
            }

            .sidebar-resize-handle.active::after {
                background: rgba(102, 126, 234, 0.8);
            }
        }


        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sidebar-header h1 {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 38px;
            border: none;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .search-box-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            pointer-events: none;
            z-index: 1;
        }

        .catalog-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .catalog-container::-webkit-scrollbar {
            width: 6px;
        }

        .catalog-container::-webkit-scrollbar-thumb {
            background: #dcdfe6;
            border-radius: 3px;
        }

        .catalog-node {
            margin: 0;
        }

        .catalog-title {
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .catalog-title:hover {
            background: #f5f7fa;
        }

        .catalog-title .arrow {
            font-size: 10px;
            transition: transform 0.3s;
            margin-left: 8px;
            margin-right: 8px;
            width: 14px;
            display: inline-block;
            order: -1;
            flex-shrink: 0;
        }


        .catalog-title.expanded .arrow {
            transform: rotate(90deg);
        }

        .catalog-title-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .catalog-children {
            display: none;
        }

        .catalog-children.expanded {
            display: block;
        }

        .level-1 > .catalog-title {
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #303133;
            background: #f8f9fa;
            border-bottom: 1px solid #e4e7ed;
        }

        .level-2 > .catalog-title {
            padding: 10px 20px 10px 35px;
            font-size: 14px;
            font-weight: 500;
            color: #606266;
        }

        .level-3 > .catalog-title {
            padding: 8px 20px 8px 50px;
            font-size: 13px;
            font-weight: 500;
            color: #909399;
        }

        .level-4 > .catalog-title {
            padding: 8px 20px 8px 65px;
            font-size: 12px;
            font-weight: 500;
            color: #a6a9ad;
        }

        .level-5 > .catalog-title,
        .level-6 > .catalog-title {
            padding: 6px 20px 6px 80px;
            font-size: 12px;
            font-weight: normal;
            color: #b0b3b8;
        }

        .catalog-word-item {
            padding: 6px 20px 6px 80px;
            font-size: 12px;
            color: #909399;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            flex-wrap: nowrap;
        }

        .level-2 .catalog-word-item { padding-left: 50px; }
        .level-3 .catalog-word-item { padding-left: 65px; }
        .level-4 .catalog-word-item { padding-left: 80px; }

        .catalog-word-item:hover {
            background: #f5f7fa;
            color: #667eea;
        }

        .catalog-word-item.active {
            background: #ecf0ff;
            color: #667eea;
            border-left-color: #667eea;
            font-weight: 500;
        }

        .word-definition {
            font-size: 11px;
            color: #a8abb2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            flex-shrink: 1;
            min-width: 0;
        }

        .catalog-word-item:hover .word-definition {
            color: #909399;
        }

        .catalog-word-item.active .word-definition {
            color: #8c93d6;
        }

        .word-pronunciation-nav {
            font-size: 10px;
            color: #b0b5bd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
            flex-shrink: 1;
            min-width: 0;
        }

        .catalog-word-item:hover .word-pronunciation-nav {
            color: #909399;
        }

        .catalog-word-item.active .word-pronunciation-nav {
            color: #a0a8d0;
        }

        .word-number-badge {
            display: inline-block;
            background: #e2e8f0;
            color: #64748b;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            margin-right: 8px;
            font-family: monospace;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .catalog-word-item.active .word-number-badge {
            background: #667eea;
            color: white;
        }

        .speak-icon {
            width: 18px;
            height: 18px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            background-image: url('ico/speaker03.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            flex-shrink: 0;
        }

        .catalog-word-item:hover .speak-icon {
            opacity: 1;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 15px 20px;
            background: #fff;
            border-bottom: 1px solid #e4e7ed;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .content-header h2 {
            font-size: 18px;
            color: #303133;
        }

        .filter-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-controls select {
            padding: 6px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 13px;
            color: #606266;
            outline: none;
            cursor: pointer;
        }

        .filter-controls select:hover {
            border-color: #667eea;
        }

        .export-btn {
            padding: 6px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .export-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
        }

        .export-group {
            display: flex;
            gap: 8px;
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px 22px;
        }

        .content-body::-webkit-scrollbar {
            width: 6px;
        }

        .content-body::-webkit-scrollbar-thumb {
            background: #dcdfe6;
            border-radius: 3px;
        }

        .word-card {
            background: #fff;
            border-radius: 8px;
            padding: 18px 22px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }

        .word-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
        }

        .word-card .word-title {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .word-card .word-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        .word-card .word-name {
            display: inline-block;
        }

        .word-card .word-pronunciation {
            color: #909399;
            font-size: 15px;
            display: inline-block;
        }

        .word-card .word-meta {
            color: #909399;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .word-card .markdown-content {
            line-height: 1.65;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 15px;
        }

        .word-card .markdown-content h1,
        .word-card .markdown-content h2,
        .word-card .markdown-content h3,
        .word-card .markdown-content h4,
        .word-card .markdown-content h5,
        .word-card .markdown-content h6 {
            margin: 10px 0 5px 0;
            font-size: 16px;
        }

        .word-card .markdown-content p {
            margin: 5px 0;
        }

        .word-card .markdown-content ul,
        .word-card .markdown-content ol {
            margin: 5px 0 5px 20px;
            padding: 0;
        }

        .word-card .markdown-content li {
            margin: 3px 0;
        }

        .word-card .markdown-content code {
            font-size: 14px;
            padding: 2px 5px;
            background: #f5f7fa;
            border-radius: 3px;
        }

        .word-card .markdown-content pre {
            font-size: 14px;
            padding: 10px;
            background: #f5f7fa;
            border-radius: 4px;
            overflow-x: auto;
        }

        .word-card .markdown-content blockquote {
            font-size: 14px;
            margin: 8px 0;
            padding: 5px 12px;
            border-left: 3px solid #667eea;
            background: #f8f9fa;
        }

        .speak-btn {
            padding: 4px 12px 4px 22px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 12px;
            position: relative;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .speak-btn::before {
            content: "";
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background-image: url('ico/speaker03.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
        }

        .speak-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
        }

        .read-all-btn {
            padding: 7px 18px 7px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 13px;
            position: relative;
            transition: all 0.3s;
        }

        .read-all-btn::before {
            content: "";
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background-image: url('ico/speaker03.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
        }

        .read-all-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
        }

        .read-all-btn.reading {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
        }

        .back-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            display: none;
        }

        .back-btn:hover {
            background: #764ba2;
        }

        .word-navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px 0;
            margin-top: 10px;
            border-top: 1px solid #e4e7ed;
            gap: 12px;
        }



        .nav-btn {
            padding: 6px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-info {
            font-size: 12px;
            color: #606266;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: #fff;
            border-top: 1px solid #e4e7ed;
        }

        .pagination button {
            padding: 6px 12px;
            border: 1px solid #dcdfe6;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            color: #606266;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            border-color: #667eea;
            color: #667eea;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination .page-info {
            font-size: 12px;
            color: #606266;
        }

        .pagination .jump-input {
            width: 50px;
            padding: 4px 8px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            text-align: center;
            font-size: 12px;
        }

        .pagination .jump-btn {
            padding: 4px 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .pagination .jump-btn:hover {
            background: #764ba2;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #909399;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
        }

        .no-data .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 50vh;
                min-height: 300px;
                border-right: none;
                border-bottom: 1px solid #e4e7ed;
            }

            .content-body {
                padding: 10px;
            }
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 50vh;
                min-height: 300px;
                border-right: none;
                border-bottom: 1px solid #e4e7ed;
            }

            .sidebar-header {
                padding: 12px 15px;
            }

            .sidebar-header h1 {
                font-size: 16px;
                margin-bottom: 10px;
            }

            .search-box input {
                padding: 8px 12px 8px 34px;
                font-size: 13px;
            }

            .catalog-title {
                padding: 10px 15px !important;
                font-size: 14px !important;
            }

            .catalog-word-item {
                padding: 10px 15px !important;
                font-size: 13px;
                min-height: 40px;
            }

            .word-definition {
                font-size: 11px;
                max-width: 120px;
            }

            .content-header {
                padding: 10px 15px;
                flex-wrap: wrap;
                gap: 8px;
            }


            .content-header h2 {
                font-size: 16px;
                width: 100%;
            }

            .filter-controls {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
            }

            .export-group {
                order: 1;
                width: 100%;
                display: flex;
                gap: 6px;
            }

            .export-btn {
                flex: 1;
                padding: 8px 10px;
                font-size: 12px;
                justify-content: center;
            }

            .read-all-btn {
                flex: 1;
                padding: 8px 12px;
                font-size: 13px;
            }

            #filterSelect {
                flex: 2;
                padding: 8px 10px;
                font-size: 13px;
            }

            .back-btn {
                flex: 1;
                padding: 8px 12px;
                font-size: 13px;
            }

            .content-body {
                padding: 10px;
            }

            .word-card {
                padding: 14px 16px;
                margin-bottom: 12px;
            }

            .word-card .word-title {
                font-size: 18px;
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }

            .word-card .word-pronunciation {
                font-size: 14px;
            }

            .speak-btn {
                padding: 6px 14px 6px 24px;
                font-size: 13px;
                width: 100%;
                justify-content: center;
            }

            .word-card .markdown-content {
                font-size: 14px;
            }

            .word-navigation {
                gap: 8px;
                padding: 10px 0;
            }

            .nav-btn {
                padding: 8px 14px;
                font-size: 13px;
                flex: 1;
                justify-content: center;
            }

            .nav-info {
                font-size: 13px;
            }

            .pagination {
                padding: 10px;
                gap: 6px;
                flex-wrap: wrap;
            }

            .pagination button {
                padding: 8px 12px;
                font-size: 13px;
            }

            .page-info {
                font-size: 13px;
                order: -1;
                width: 100%;
                text-align: center;
                margin-bottom: 6px;
            }

            .jump-input {
                padding: 6px 8px;
                font-size: 13px;
            }

            .jump-btn {
                padding: 6px 12px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                height: 50vh;
                min-height: 250px;
            }

            .sidebar-header h1 {
                font-size: 15px;
            }

            .word-card .word-title {
                font-size: 17px;
            }

            .word-card .markdown-content {
                font-size: 13px;
            }

            .export-btn {
                padding: 7px 8px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1><img src="ico/book01.png" alt="book" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 8px;">13000英语4500词</h1>
            <div class="search-box">
                <img src="ico/search02.png" alt="search" class="search-box-icon">
                <input type="text" id="searchInput" placeholder="搜索单词..." oninput="handleSearch(this.value)">
            </div>
        </div>
        <div class="catalog-container" id="catalogContainer">
            <div class="loading">加载中...</div>
        </div>
        <div class="sidebar-resize-handle" id="resizeHandle"></div>
    </div>

    <div class="content-area">
        <div class="content-header">
            <h2 id="contentTitle">单词详情</h2>
            <div class="filter-controls">
                <button class="read-all-btn" id="readAllBtn" onclick="toggleReadAll()">全文朗读</button>
                <div class="export-group">
                    <button class="export-btn" onclick="exportFile('md')">📄 MD</button>
                    <button class="export-btn" onclick="exportFile('pdf')">📕 PDF</button>
                    <button class="export-btn" onclick="exportFile('word')">📘 Word</button>
                    <button class="export-btn" onclick="exportFile('excel')">📗 Excel</button>
                </div>
                <button id="backToListBtn" class="back-btn" onclick="backToList()">返回列表</button>
                <select id="filterSelect" onchange="handleFilter(this.value)">
                    <option value="all">全部显示</option>
                    <option value="layer1">一、基础必备层（800词）</option>
                    <option value="layer2">二、核心高频层（2000词）</option>
                    <option value="layer3">三、高频进阶层（1200词）</option>
                    <option value="layer4">四、低频储备层（1000词）</option>
                </select>
            </div>
        </div>
        <div class="content-body" id="contentBody">
            <div class="no-data">
                <div class="icon">📖</div>
                <p>请从左侧目录选择单词</p>
            </div>
        </div>
        <div class="pagination" id="pagination" style="display: none;">
            <button onclick="prevPage()" id="prevBtn">上一页</button>
            <span class="page-info">第 <span id="currentPage">1</span> / <span id="totalPages">1</span> 页</span>
            <input type="number" class="jump-input" id="jumpPage" min="1" placeholder="页码">
            <button class="jump-btn" onclick="jumpToPage()">跳转</button>
            <button onclick="nextPage()" id="nextBtn">下一页</button>
        </div>
    </div>
</div>

<script>
    let allWords = [];
    let catalogStructure = [];
    let filteredWords = [];
    let currentFilter = 'all';
    let currentPage = 1;
    let pageSize = 10;
    let currentView = 'list';
    let currentDetailIndex = -1;
    let lastListPosition = { page: 1, scrollTop: 0 };
    let speechSynth = window.speechSynthesis;
    let isReadingAll = false;
    let readAllIndex = 0;
    let expandedNodes = new Set();
    let isMobileResizing = false;
    let mobileStartY = 0;
    let mobileStartHeight = 0;

    marked.setOptions({ breaks: true, gfm: true });

    async function init() {
        try {
            console.log('🔄 开始加载数据...');

            const wordsRes = await fetch('/api/all-words');
            console.log('📊 all-words 响应状态:', wordsRes.status);

            if (!wordsRes.ok) {
                throw new Error(`all-words API 请求失败: ${wordsRes.status} ${wordsRes.statusText}`);
            }

            const catalogRes = await fetch('/api/catalog');
            console.log('📂 catalog 响应状态:', catalogRes.status);

            if (!catalogRes.ok) {
                throw new Error(`catalog API 请求失败: ${catalogRes.status} ${catalogRes.statusText}`);
            }

            allWords = await wordsRes.json();
            catalogStructure = await catalogRes.json();

            console.log('\u2705 \u52a0\u8f7d\u5b8c\u6210:', allWords.length, '\u4e2a\u5355\u8bcd');
            console.log('📁 目录结构层级数:', catalogStructure.length);

            const numberMap = buildNumberMap(catalogStructure);
            allWords = allWords.map(word => {
                const key = word.word.toLowerCase();
                if (numberMap[key]) {
                    word.number = numberMap[key];
                } else if (word.content) {
                    const match = word.content.match(/^(\d{3})/);
                    if (match) {
                        word.number = match[1];
                    }
                }
                return word;
            });

            console.log('\u6837\u4f8b\u5355\u8bcd:', allWords.slice(0, 3));

            renderCatalog(catalogStructure);
            filteredWords = [...allWords];
            if (filteredWords.length > 0) showPage(1);
        } catch (error) {
            console.error('\u274c \u52a0\u8f7d\u5931\u8d25:', error);
            document.getElementById('catalogContainer').innerHTML =
                '<div class="no-data">' +
                '<div class="icon">\u26a0\ufe0f</div>' +
                '<p>\u52a0\u8f7d\u5931\u8d25</p>' +
                '<p style="font-size: 12px; color: #999; margin-top: 10px;">' + error.message + '</p>' +
                '<p style="font-size: 12px; color: #667eea; margin-top: 15px; cursor: pointer;" onclick="location.reload()">点击刷新重试</p>' +
                '</div>';
        }
    }


    function buildNumberMap(nodes, map = {}) {
        for (const node of nodes) {
            if (node.words) {
                for (const word of node.words) {
                    if (word.word && word.number) {
                        map[word.word.toLowerCase()] = word.number;
                    }
                }
            }
            if (node.children) {
                buildNumberMap(node.children, map);
            }
        }
        return map;
    }


    function renderCatalog(nodes, level = 1, container = null) {
        if (!container) {
            container = document.getElementById('catalogContainer');
            container.innerHTML = '';
            if (!nodes || nodes.length === 0) {
                container.innerHTML = '<div class="no-data"><div class="icon">\ud83d\udcc2</div><p>\u6682\u65e0\u6570\u636e</p></div>';
                return;
            }
            if (nodes.length === 1 && nodes[0].level === 1) {
                const rootNode = nodes[0];
                if (rootNode.title && (rootNode.title.includes('自考') || rootNode.title.includes('四层'))) {
                    nodes = rootNode.children || [];
                }
            }
        }

        const fragment = document.createDocumentFragment();

        for (const node of nodes) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = `catalog-node level-${Math.min(level, 6)}`;

            const titleDiv = document.createElement('div');
            titleDiv.className = 'catalog-title';

            const hasChildren = node.children && node.children.length > 0;
            const hasWords = node.words && node.words.length > 0;
            const isExpandable = hasChildren || hasWords;
            const nodeId = `node-${level}-${node.title}`;

            if (isExpandable) {
                const textSpan = document.createElement('span');
                textSpan.className = 'catalog-title-text';
                textSpan.textContent = node.title;
                titleDiv.appendChild(textSpan);

                const arrowSpan = document.createElement('span');
                arrowSpan.className = 'arrow';
                arrowSpan.textContent = '\u25b6';
                titleDiv.appendChild(arrowSpan);

                const isExpanded = expandedNodes.has(nodeId) || level === 1;
                if (isExpanded) {
                    titleDiv.classList.add('expanded');
                }

                titleDiv.onclick = (e) => {
                    e.stopPropagation();
                    const isNowExpanded = titleDiv.classList.toggle('expanded');
                    const childrenDiv = nodeDiv.querySelector('.catalog-children');
                    if (childrenDiv) childrenDiv.classList.toggle('expanded');

                    if (isNowExpanded) {
                        expandedNodes.add(nodeId);
                    } else {
                        expandedNodes.delete(nodeId);
                    }
                };
            } else {
                const textSpan = document.createElement('span');
                textSpan.className = 'catalog-title-text';
                textSpan.textContent = node.title;
                titleDiv.appendChild(textSpan);
                titleDiv.style.cursor = 'default';
            }

            nodeDiv.appendChild(titleDiv);

            if (isExpandable) {
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'catalog-children';

                const isExpanded = expandedNodes.has(nodeId) || level === 1;
                if (isExpanded) {
                    childrenContainer.classList.add('expanded');
                }

                if (hasChildren) {
                    renderCatalog(node.children, level + 1, childrenContainer);
                }

                if (hasWords) {
                    for (const word of node.words) {
                        const wordItem = createWordItem(word);
                        childrenContainer.appendChild(wordItem);
                    }
                }

                nodeDiv.appendChild(childrenContainer);
            }

            fragment.appendChild(nodeDiv);
        }

        container.appendChild(fragment);
    }

    function createWordItem(word) {
        const wordItem = document.createElement('div');
        wordItem.className = 'catalog-word-item';

        const leftSpan = document.createElement('span');
        leftSpan.style.whiteSpace = 'nowrap';
        const numberSpan = document.createElement('span');
        numberSpan.className = 'word-number-badge';
        numberSpan.textContent = word.number || String(word.sortOrder).padStart(3, '0');
        leftSpan.appendChild(numberSpan);
        leftSpan.appendChild(document.createTextNode(' ' + word.word));

        const speakIcon = document.createElement('span');
        speakIcon.className = 'speak-icon';
        speakIcon.onclick = (e) => {
            e.stopPropagation();
            speakWord(word.word);
        };

        wordItem.appendChild(leftSpan);

        if (word.pronunciation) {
            const pronunciationSpan = document.createElement('span');
            pronunciationSpan.className = 'word-pronunciation-nav';
            pronunciationSpan.textContent = word.pronunciation;
            wordItem.appendChild(pronunciationSpan);
        }

        if (word.definition) {
            const definitionSpan = document.createElement('span');
            definitionSpan.className = 'word-definition';
            definitionSpan.textContent = word.definition;
            wordItem.appendChild(definitionSpan);
        }

        wordItem.appendChild(speakIcon);

        wordItem.dataset.wordId = word.id || '';
        wordItem.dataset.wordName = word.word;
        wordItem.dataset.sortOrder = word.sortOrder;
        wordItem.dataset.number = word.number || '';

        wordItem.onclick = () => {
            console.log('\u70b9\u51fb\u5355\u8bcd:', word.word, 'ID:', word.id, 'number:', word.number, 'sortOrder:', word.sortOrder);
            if (word.id) {
                showWordById(word.id);
            } else if (word.number) {
                showWordByNumber(word.number, word.word);
            } else {
                showWordBySortOrder(word.sortOrder);
            }
        };

        return wordItem;
    }




    async function showWordById(id) {
        try {
            console.log('\u901a\u8fc7ID\u67e5\u627e\u5355\u8bcd:', id);
            const word = allWords.find(w => String(w.id) === String(id));
            if (word) {
                console.log('\u627e\u5230\u5355\u8bcd:', word.word);
                displayWord(word);
            } else {
                console.warn('\u672a\u627e\u5230ID\u4e3a', id, '\u7684\u5355\u8bcd');
            }
        } catch (error) {
            console.error('\u67e5\u627e\u5931\u8d25:', error);
        }
    }

    function showWordByNumber(number, wordName) {
        console.log('\u901a\u8fc7number\u67e5\u627e:', number, wordName);
        const word = allWords.find(w => w.content && w.content.startsWith(number));
        if (word) {
            console.log('\u627e\u5230\u5355\u8bcd:', word.word, 'ID:', word.id);
            displayWord(word);
        } else {
            console.error('\u672a\u627e\u5230number\u4e3a', number, '\u7684\u5355\u8bcd');
        }
    }

    function showWordBySortOrder(sortOrder) {
        console.log('\u901a\u8fc7sortOrder\u67e5\u627e:', sortOrder);
        const word = allWords.find(w => w.sortOrder == sortOrder);
        if (word) {
            console.log('\u627e\u5230\u5355\u8bcd:', word.word, 'ID:', word.id);
            displayWord(word);
        } else {
            console.error('\u672a\u627e\u5230sortOrder\u4e3a', sortOrder, '\u7684\u5355\u8bcd');
        }
    }

    function displayWord(word) {
        const index = filteredWords.findIndex(w => w.id == word.id || String(w.id) === String(word.id));
        currentView = 'detail';
        currentDetailIndex = index >= 0 ? index : 0;

        document.getElementById('pagination').style.display = 'none';
        document.getElementById('backToListBtn').style.display = 'inline-block';
        document.getElementById('contentTitle').textContent = '\u5355\u8bcd\u8be6\u60c5';

        renderWordCard(word, currentDetailIndex);
        highlightWord(word.id, word.word, word.sortOrder);
    }

    function renderWordCard(word, index) {
        const container = document.getElementById('contentBody');
        container.innerHTML = '';

        const number = word.number || (word.content ? (word.content.match(/^(\d{3})/) || [])[1] : '') || String(word.sortOrder).padStart(3, '0');

        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerHTML = `
            <div class="word-title">
                <span class="word-number">${number}</span>
                <span class="word-name">${word.word}</span>
                <span class="word-pronunciation">${word.pronunciation || ''}</span>
                <button class="speak-btn" onclick="speakWord('${word.word.replace(/'/g, "\\'")}')">朗读</button>
            </div>
            ${word.definition ? `<div class="word-meta">${escapeHtml(word.definition)}</div>` : ''}
            <div class="markdown-content">${marked.parse(word.content || '')}</div>
            <div class="word-navigation">
                <button class="nav-btn" id="prevBtn" ${index <= 0 ? 'disabled' : ''}>◀ 上一个</button>
                <span class="nav-info">${index + 1} / ${filteredWords.length}</span>
                <button class="nav-btn" id="nextBtn" ${index >= filteredWords.length - 1 ? 'disabled' : ''}>下一个 ▶</button>
            </div>
        `;

        container.appendChild(card);

        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (index > 0) {
                const prevWord = filteredWords[index - 1];
                if (prevWord.id) showWordById(prevWord.id);
                else if (prevWord.number) showWordByNumber(prevWord.number, prevWord.word);
                else showWordBySortOrder(prevWord.sortOrder);
            }
        });
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (index < filteredWords.length - 1) {
                const nextWord = filteredWords[index + 1];
                if (nextWord.id) showWordById(nextWord.id);
                else if (nextWord.number) showWordByNumber(nextWord.number, nextWord.word);
                else showWordBySortOrder(nextWord.sortOrder);
            }
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function highlightWord(id, wordName, sortOrder) {
        document.querySelectorAll('.catalog-word-item').forEach(item => item.classList.remove('active'));
        let target = document.querySelector(`.catalog-word-item[data-word-id="${id}"]`);
        if (!target && id) {
            target = document.querySelector(`.catalog-word-item[data-word-id="${id}"]`);
        }
        if (!target) {
            target = document.querySelector(`.catalog-word-item[data-word-name="${wordName}"][data-sort-order="${sortOrder}"]`);
        }
        if (target) {
            target.classList.add('active');
            target.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
    }

    function speakWord(word) {
        if (speechSynth.speaking) speechSynth.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        speechSynth.speak(utterance);
    }

    function toggleReadAll() {
        const btn = document.getElementById('readAllBtn');
        if (isReadingAll) {
            speechSynth.cancel();
            isReadingAll = false;
            btn.classList.remove('reading');
            btn.textContent = '全文朗读';
            return;
        }
        isReadingAll = true;
        readAllIndex = 0;
        btn.classList.add('reading');
        btn.textContent = '停止朗读';
        readNextWord();
    }

    function readNextWord() {
        if (!isReadingAll || readAllIndex >= filteredWords.length) {
            toggleReadAll();
            return;
        }

        const word = filteredWords[readAllIndex];
        const number = word.number || String(word.sortOrder).padStart(3, '0');
        const definition = word.definition || '';

        const textToRead = `${number} ${word.word} ${definition}`;

        let repeatCount = 0;
        const maxRepeats = 2;

        function speakCurrent() {
            if (!isReadingAll) return;

            if (repeatCount < maxRepeats) {
                const utterance = new SpeechSynthesisUtterance(textToRead);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                utterance.onend = () => {
                    repeatCount++;
                    setTimeout(speakCurrent, 500);
                };
                utterance.onerror = () => {
                    repeatCount++;
                    setTimeout(speakCurrent, 500);
                };
                speechSynth.speak(utterance);
            } else {
                readAllIndex++;
                setTimeout(readNextWord, 800);
            }
        }

        speakCurrent();
    }

    function backToList() {
        currentView = 'list';
        document.getElementById('backToListBtn').style.display = 'none';
        document.getElementById('contentTitle').textContent = '全部单词';
        showPage(lastListPosition.page);
        setTimeout(() => {
            document.getElementById('contentBody').scrollTop = lastListPosition.scrollTop;
        }, 50);
    }

    function showPage(page) {
        currentView = 'list';
        const total = Math.ceil(filteredWords.length / pageSize);
        if (total === 0) {
            document.getElementById('pagination').style.display = 'none';
            document.getElementById('contentBody').innerHTML = '<div class="no-data"><div class="icon">🔍</div><p>没有找到单词</p></div>';
            return;
        }
        page = Math.min(Math.max(1, page), total);
        currentPage = page;

        const start = (page - 1) * pageSize;
        const end = start + pageSize;
        renderWordList(filteredWords.slice(start, end));

        document.getElementById('currentPage').textContent = page;
        document.getElementById('totalPages').textContent = total;
        document.getElementById('prevBtn').disabled = page === 1;
        document.getElementById('nextBtn').disabled = page === total;
        document.getElementById('pagination').style.display = 'flex';

        if (currentView === 'list') lastListPosition.page = page;
    }

    function renderWordList(words) {
        const container = document.getElementById('contentBody');
        container.innerHTML = '';
        for (const word of words) {
            const number = word.number || (word.content ? (word.content.match(/^(\d{3})/) || [])[1] : '');
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerHTML = `
                <div class="word-title">
                    ${number ? `<span class="word-number">${number}</span>` : ''}
                    <span class="word-name">${word.word}</span>
                    <span class="word-pronunciation">${word.pronunciation || ''}</span>
                    <button class="speak-btn" onclick="speakWord('${word.word.replace(/'/g, "\\'")}')">朗读</button>
                </div>
                ${word.definition ? `<div class="word-meta">${escapeHtml(word.definition)}</div>` : ''}
                <div class="markdown-content">${marked.parse(word.content || '')}</div>
            `;
            container.appendChild(card);
        }
    }

    function prevPage() { if (currentPage > 1) showPage(currentPage - 1); }
    function nextPage() { const total = Math.ceil(filteredWords.length / pageSize); if (currentPage < total) showPage(currentPage + 1); }
    function jumpToPage() {
        const page = parseInt(document.getElementById('jumpPage').value);
        const total = Math.ceil(filteredWords.length / pageSize);
        if (page >= 1 && page <= total) { showPage(page); document.getElementById('jumpPage').value = ''; }
    }

    let searchTimer;
    function handleSearch(keyword) {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            if (!keyword.trim()) {
                handleFilter(currentFilter);
                return;
            }
            const kw = keyword.toLowerCase().trim();
            const exact = allWords.find(w => w.word.toLowerCase() === kw);
            if (exact) {
                lastListPosition = { page: currentPage, scrollTop: document.getElementById('contentBody').scrollTop };
                showWordById(exact.id);
                return;
            }
            filteredWords = allWords.filter(w =>
                w.word.toLowerCase().includes(kw) ||
                (w.definition && w.definition.toLowerCase().includes(kw)) ||
                (w.content && w.content.toLowerCase().includes(kw))
            );
            document.getElementById('contentTitle').textContent = `搜索结果：${filteredWords.length} 个单词`;
            document.getElementById('backToListBtn').style.display = 'none';
            currentPage = 1;
            showPage(1);
        }, 300);
    }

    function handleFilter(value) {
        currentFilter = value;
        document.getElementById('backToListBtn').style.display = 'none';

        if (value === 'all') {
            filteredWords = [...allWords];
            document.getElementById('contentTitle').textContent = '全部单词';
        } else {
            const map = { layer1: '一、基础必备层', layer2: '二、核心高频层', layer3: '三、高频进阶层', layer4: '四、低频储备层' };
            const keyword = map[value];
            filteredWords = allWords.filter(w => w.layer1 && w.layer1.includes(keyword));
            const titles = { layer1: '🌟 一、基础必备层（800词）', layer2: '⭐ 二、核心高频层（2000词）', layer3: '✨ 三、高频进阶层（1200词）', layer4: '💫 四、低频储备层（1000词）' };
            document.getElementById('contentTitle').textContent = titles[value];
        }

        currentPage = 1;
        if (filteredWords.length === 0) {
            document.getElementById('contentBody').innerHTML = '<div class="no-data"><div class="icon">🔍</div><p>该分类下暂无单词</p></div>';
            document.getElementById('pagination').style.display = 'none';
        } else {
            showPage(1);
        }
    }

    function exportFile(format) {
        const urlMap = {
            'md': '/api/export/md',
            'pdf': '/api/export/pdf',
            'word': '/api/export/word',
            'excel': '/api/export/excel'
        };

        const url = urlMap[format];
        if (!url) {
            alert('不支持的格式');
            return;
        }

        window.open(url, '_blank');
    }

    function initResizeHandle() {
        const sidebar = document.querySelector('.sidebar');
        const resizeHandle = document.getElementById('resizeHandle');
        let isResizing = false;
        let startX = 0;
        let startWidth = 0;

        resizeHandle.addEventListener('mousedown', (e) => {
            isResizing = true;
            startX = e.clientX;
            startWidth = sidebar.offsetWidth;
            resizeHandle.classList.add('active');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;

            const newWidth = startWidth + (e.clientX - startX);
            const minWidth = 280;
            const maxWidth = 600;

            if (newWidth >= minWidth && newWidth <= maxWidth) {
                sidebar.style.width = newWidth + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                resizeHandle.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });

        resizeHandle.addEventListener('touchstart', (e) => {
            isResizing = true;
            startX = e.touches[0].clientX;
            startWidth = sidebar.offsetWidth;
            resizeHandle.classList.add('active');
            e.preventDefault();
        });

        document.addEventListener('touchmove', (e) => {
            if (!isResizing) return;

            const newWidth = startWidth + (e.touches[0].clientX - startX);
            const minWidth = 280;
            const maxWidth = 600;

            if (newWidth >= minWidth && newWidth <= maxWidth) {
                sidebar.style.width = newWidth + 'px';
            }
            e.preventDefault();
        });

        document.addEventListener('touchend', () => {
            if (isResizing) {
                isResizing = false;
                resizeHandle.classList.remove('active');
            }
        });
    }

    function initMobileResize() {
        const sidebar = document.querySelector('.sidebar');
        const resizeHandle = document.getElementById('resizeHandle');

        if (!resizeHandle || !sidebar) return;

        resizeHandle.addEventListener('touchstart', (e) => {
            isMobileResizing = true;
            mobileStartY = e.touches[0].clientY;
            mobileStartHeight = sidebar.offsetHeight;
            resizeHandle.classList.add('active');
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (!isMobileResizing) return;

            const deltaY = e.touches[0].clientY - mobileStartY;
            const newHeight = mobileStartHeight + deltaY;
            const minHeight = 200;
            const maxHeight = window.innerHeight * 0.8;

            if (newHeight >= minHeight && newHeight <= maxHeight) {
                sidebar.style.height = newHeight + 'px';
            }
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchend', () => {
            if (isMobileResizing) {
                isMobileResizing = false;
                resizeHandle.classList.remove('active');
            }
        });
    }

    initResizeHandle();
    initMobileResize();
    init();
</script>
</body>
</html>
